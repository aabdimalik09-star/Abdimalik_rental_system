{% extends 'base.html' %}
{% block content %}
<div class="row" style="margin-top: 40px;">
    <div class="col-md-4 col-md-offset-4">
        <div class="panel-editorial" style="border: 1px solid #111;">
            <h2 style="font-weight: 300; text-transform: uppercase; letter-spacing: 3px; font-size: 18px; margin-bottom: 30px; text-align: center;">Identification</h2>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #777;">Email Address</label>
                    <input type="email" name="email" class="form-control" required style="border-radius: 0; border: 1px solid #ccc; height: 40px; box-shadow: none;">
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #777;">Password Key</label>
                    <input type="password" name="password" class="form-control" required style="border-radius: 0; border: 1px solid #ccc; height: 40px; box-shadow: none;">
                </div>
                <button type="submit" class="btn" style="background: #000; color: #fff; width: 100%; border-radius: 0; height: 45px; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; font-weight: 700;">Authorize Access</button>
            </form>
            <div style="text-align: center; margin-top: 15px;">
                <a href="{{ url_for('register') }}" style="font-size: 10px; text-transform: uppercase; color: #777; letter-spacing: 1px;">Create Account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
